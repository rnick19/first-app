<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&P 500 & Dow Jones – Last 10 Years</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p { font-size: 0.8rem; color: #64748b; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 16px 32px 0;
    }

    .btn {
      padding: 6px 16px;
      border: 1px solid #334155;
      border-radius: 20px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .btn.sp500.active { background: #1e3a5f; border-color: #60a5fa; color: #60a5fa; }
    .btn.dji.active   { background: #2d1b4e; border-color: #a78bfa; color: #a78bfa; }

    .range-btns { margin-left: auto; display: flex; gap: 6px; }
    .range-btn {
      padding: 5px 12px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .range-btn:hover { border-color: #94a3b8; color: #e2e8f0; }
    .range-btn.active { background: #1e293b; border-color: #94a3b8; color: #e2e8f0; }

    .stats-row {
      display: flex;
      gap: 12px;
      padding: 16px 32px 0;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 20px;
      min-width: 160px;
    }

    .stat-card .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.2rem; font-weight: 700; margin-top: 2px; }
    .stat-card .change { font-size: 0.75rem; margin-top: 2px; }
    .positive { color: #34d399; }
    .negative { color: #f87171; }

    .chart-container {
      margin: 20px 32px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 20px;
      position: relative;
      height: 420px;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e293b;
      border-radius: 14px;
      gap: 12px;
      z-index: 10;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    canvas { display: block; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #475569;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>S&P 500 &amp; Dow Jones Industrial Average</h1>
    <p id="last-updated">Historical performance – last 10 years</p>
  </div>
</header>

<div class="controls">
  <button class="btn sp500 active" id="toggle-sp500" onclick="toggleIndex('sp500')">S&amp;P 500 (^GSPC)</button>
  <button class="btn dji active"   id="toggle-dji"   onclick="toggleIndex('dji')">Dow Jones (^DJI)</button>

  <div class="range-btns">
    <button class="range-btn" onclick="setRange('1y')">1Y</button>
    <button class="range-btn" onclick="setRange('3y')">3Y</button>
    <button class="range-btn" onclick="setRange('5y')">5Y</button>
    <button class="range-btn active" onclick="setRange('10y')">10Y</button>
  </div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="chart-container">
  <div id="loading">
    <div class="spinner"></div>
    <span style="color:#64748b;font-size:0.85rem" id="loading-text">Fetching market data…</span>
  </div>
  <canvas id="myChart"></canvas>
</div>

<footer id="footer-note">Data sourced from Yahoo Finance · Prices are monthly closing values · For informational purposes only</footer>

<script>

      ['2020-01',3226],['2020-02',2954],['2020-03',2585],['2020-04',2912],['2020-05',3044],['2020-06',3100],
      ['2020-07',3271],['2020-08',3500],['2020-09',3363],['2020-10',3270],['2020-11',3622],['2020-12',3756],

      ['2021-07',35121],['2021-08',35361],['2021-09',33844],['2021-10',35820],['2021-11',34483],['2021-12',36338],
      ['2022-01',35132],['2022-02',33895],['2022-03',34678],['2022-04',32977],['2022-05',32990],['2022-06',30775],
      ['2022-07',32845],['2022-08',31510],['2022-09',28726],['2022-10',32732],['2022-11',34589],['2022-12',33147],
      ['2023-01',34086],['2023-02',32657],['2023-03',33274],['2023-04',34098],['2023-05',33093],['2023-06',34408],
      ['2023-07',35560],['2023-08',34722],['2023-09',33507],['2023-10',33052],['2023-11',35950],['2023-12',37690],
      ['2024-01',38150],['2024-02',39087],['2024-03',39807],['2024-04',37815],['2024-05',38686],['2024-06',39118],
      ['2024-07',40743],['2024-08',41563],['2024-09',42330],['2024-10',41763],['2024-11',44910],['2024-12',42544],
    ],
  };

  function parseFallback(key) {
    return FALLBACK[key].map(([ym, y]) => ({
      x: new Date(ym + '-01'),
      y,
    }));
  }

  // ── Live fetch via CORS proxies ───────────────────────────────────────────
  const YF_PARAMS = '?interval=1mo&range=10y';

  function makeProxies(sym) {
    const encoded = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}${YF_PARAMS}`);
    return [
      `https://corsproxy.io/?url=${encoded}`,
      `https://api.allorigins.win/raw?url=${encoded}`,
      `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}${YF_PARAMS}`,
      `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}${YF_PARAMS}`,
    ];
  }

  const SYMBOLS = { sp500: '^GSPC', dji: '^DJI' };

  async function fetchSymbol(key) {
    const urls = makeProxies(SYMBOLS[key]);
    for (const url of urls) {
      try {
        const resp = await fetch(url, { mode: 'cors' });
        if (!resp.ok) continue;
        const json = await resp.json();
        const result = json?.chart?.result?.[0];
        if (!result) continue;
        const closes = result.indicators.quote[0].close;
        return result.timestamp.map((t, i) => ({
          x: new Date(t * 1000),
          y: closes[i] != null ? Math.round(closes[i] * 100) / 100 : null,
        })).filter(d => d.y !== null);
      } catch(_) {}
    }
    return null; // signal: use fallback
  }

  // ── App state ─────────────────────────────────────────────────────────────
  const COLORS = {
    sp500: { line: '#60a5fa', fill: 'rgba(96,165,250,0.08)' },
    dji:   { line: '#a78bfa', fill: 'rgba(167,139,250,0.08)' },
  };

  let rawData      = { sp500: [], dji: [] };
  let chartInst    = null;
  let visible      = { sp500: true, dji: true };
  let currentRange = '10y';

  function filterByRange(data, range) {
    const cutoff = new Date();
    cutoff.setFullYear(cutoff.getFullYear() - ({ '1y':1,'3y':3,'5y':5,'10y':10 }[range] ?? 10));
    return data.filter(d => d.x >= cutoff);
  }

  function buildStats() {
    const row = document.getElementById('stats-row');
    row.innerHTML = '';
    for (const [key, label] of [['sp500','S&P 500'],['dji','Dow Jones']]) {
      const d = filterByRange(rawData[key], currentRange);
      if (!d.length) continue;
      const first = d[0].y, last = d[d.length-1].y;
      const pct  = ((last - first) / first * 100).toFixed(1);
      const cls  = pct >= 0 ? 'positive' : 'negative';
      const sign = pct >= 0 ? '+' : '';
      row.insertAdjacentHTML('beforeend', `
        <div class="stat-card">
          <div class="label">${label}</div>
          <div class="value" style="color:${COLORS[key].line}">${last.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
          <div class="change ${cls}">${sign}${pct}% (${currentRange})</div>
        </div>
      `);
    }
    const allDates = rawData.sp500.map(d => d.x);
    if (allDates.length) {
      const latest = new Date(Math.max(...allDates));
      document.getElementById('last-updated').textContent =
        `Data through ${latest.toLocaleDateString('en-US',{month:'long',year:'numeric'})}`;
    }
  }

  function renderChart() {
    const ctx = document.getElementById('myChart').getContext('2d');
    const datasets = [];
    for (const [key, label] of [['sp500','S&P 500 (^GSPC)'],['dji','Dow Jones (^DJI)']]) {
      datasets.push({
        label,
        data: filterByRange(rawData[key], currentRange),
        borderColor: COLORS[key].line,
        backgroundColor: COLORS[key].fill,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 5,
        borderWidth: 2,
        hidden: !visible[key],
        yAxisID: key === 'sp500' ? 'ySP' : 'yDJI',
      });
    }
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    chartInst = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { color: '#94a3b8', boxWidth: 12, padding: 16, font: { size: 12 } },
          },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('en-US',{maximumFractionDigits:0})}`,
            }
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: currentRange === '1y' ? 'month' : 'year', tooltipFormat: 'MMM yyyy' },
            grid: { color: '#1e293b' },
            ticks: { color: '#64748b', maxTicksLimit: 10 },
          },
          ySP: {
            type: 'linear', position: 'left', display: visible.sp500,
            grid: { color: '#334155' },
            ticks: { color: '#60a5fa', callback: v => v.toLocaleString('en-US',{maximumFractionDigits:0}) },
            title: { display: true, text: 'S&P 500', color: '#60a5fa', font: { size: 11 } },
          },
          yDJI: {
            type: 'linear', position: 'right', display: visible.dji,
            grid: { drawOnChartArea: false },
            ticks: { color: '#a78bfa', callback: v => v.toLocaleString('en-US',{maximumFractionDigits:0}) },
            title: { display: true, text: 'Dow Jones', color: '#a78bfa', font: { size: 11 } },
          },
        },
      }
    });
  }

  function toggleIndex(key) {
    visible[key] = !visible[key];
    document.getElementById(`toggle-${key}`).classList.toggle('active', visible[key]);
    renderChart();
  }

  function setRange(r) {
    currentRange = r;
    document.querySelectorAll('.range-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === r.toUpperCase());
    });
    buildStats();
    renderChart();
  }

  async function fetchAll() {
    document.getElementById('loading').style.display = 'flex';

    const [spLive, djiLive] = await Promise.all([
      fetchSymbol('sp500'),
      fetchSymbol('dji'),
    ]);

    const usedFallback = !spLive || !djiLive;
    rawData.sp500 = spLive  || parseFallback('sp500');
    rawData.dji   = djiLive || parseFallback('dji');

    if (usedFallback) {
      document.getElementById('footer-note').textContent =
        'Embedded historical data (Jan 2015 – Dec 2024) · Live data unavailable · For informational purposes only';
    }

    document.getElementById('loading').style.display = 'none';
    buildStats();
    renderChart();
  }

  fetchAll();
</script>
</body>
</html>
